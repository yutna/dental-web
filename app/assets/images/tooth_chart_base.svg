  <!-- Styles applied via CSS class hooks for Stimulus controller -->
  <style>
    .tooth { cursor: pointer; }
    .tooth:hover rect { stroke-width: 2.5; }
    .tooth.selected rect { fill: color-mix(in srgb, currentColor 12%, transparent); stroke-width: 2.5; }
    .tooth.condition-treated rect { fill: #22c55e30; stroke: #22c55e; }
    .tooth.condition-planned rect { fill: #3b82f630; stroke: #3b82f6; }
    .tooth.condition-problematic rect { fill: #ef444430; stroke: #ef4444; }
    .tooth.condition-missing rect { fill: #6b728030; stroke: #6b7280; stroke-dasharray: 4 2; }
  </style>
